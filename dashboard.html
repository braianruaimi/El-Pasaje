<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CEO - El Pasaje Food</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #C87533, #F5C842);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(245, 200, 66, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .subtitle {
            color: rgba(0, 0, 0, 0.7);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(245, 200, 66, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #F5C842;
            box-shadow: 0 10px 30px rgba(245, 200, 66, 0.3);
        }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #F5C842;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #cccccc;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(245, 200, 66, 0.3);
            border-radius: 20px;
            padding: 30px;
        }

        .chart-title {
            font-size: 1.5rem;
            color: #F5C842;
            margin-bottom: 20px;
            text-align: center;
        }

        .products-table {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(245, 200, 66, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(245, 200, 66, 0.2);
        }

        th {
            color: #F5C842;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        td {
            color: #cccccc;
        }

        tr:hover {
            background: rgba(245, 200, 66, 0.1);
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #C87533, #F5C842);
            color: #1a1a1a;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 200, 66, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid #F5C842;
        }

        .btn-secondary:hover {
            background: rgba(245, 200, 66, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8rem;
            }

            .actions {
                flex-direction: column;
            }
        }

        .highlight {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2));
            border-color: #10b981;
        }

        .conversion-rate {
            font-size: 1.2rem;
            color: #10b981;
            font-weight: 700;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍔 Dashboard CEO - El Pasaje Food</h1>
            <p class="subtitle">Panel de Control y Métricas en Tiempo Real</p>
        </header>

        <!-- Estadísticas Rápidas -->
        <div class="stats-grid" id="statsGrid">
            <!-- Se llenarán dinámicamente -->
        </div>

        <!-- Gráficos -->
        <div class="charts-section">
            <div class="chart-container">
                <h3 class="chart-title">📈 Evolución de Ventas (Últimos 7 días)</h3>
                <canvas id="salesChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">🍔 Productos Más Vendidos</h3>
                <canvas id="productsChart"></canvas>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-container">
                <h3 class="chart-title">👥 Vistas vs Conversiones</h3>
                <canvas id="conversionChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">📊 Crecimiento Semanal</h3>
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <!-- Tabla de Productos -->
        <div class="products-table">
            <h3 class="chart-title">📋 Detalle de Productos</h3>
            <table id="productsTable">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Veces Agregado</th>
                        <th>Ingreso Total</th>
                        <th>Popularidad</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <!-- Se llenará dinámicamente -->
                </tbody>
            </table>
        </div>

        <!-- Acciones -->
        <div class="actions">
            <button class="btn btn-primary" onclick="refreshDashboard()">🔄 Actualizar</button>
            <button class="btn btn-secondary" onclick="exportData()">💾 Exportar Datos</button>
            <button class="btn btn-secondary" onclick="goToSite()">🏠 Ir al Sitio</button>
            <button class="btn btn-danger" onclick="resetMetrics()">🗑️ Resetear Métricas</button>
        </div>
    </div>

    <script src="tracking.js"></script>
    <script>
        // Variables globales para los gráficos
        let salesChart, productsChart, conversionChart, growthChart;

        // Cargar dashboard al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
        });

        function loadDashboard() {
            const metrics = JSON.parse(localStorage.getItem('elpasaje_metrics')) || {
                totalViews: 0,
                uniqueVisitors: 0,
                whatsappClicks: 0,
                cartItems: [],
                orderHistory: [],
                dailyStats: {},
                productStats: {}
            };

            // Calcular estadísticas
            const totalOrders = metrics.orderHistory.length;
            const totalRevenue = metrics.orderHistory.reduce((sum, order) => sum + order.total, 0);
            const conversionRate = metrics.uniqueVisitors > 0 
                ? ((totalOrders / metrics.uniqueVisitors) * 100).toFixed(2) 
                : 0;
            const avgOrderValue = totalOrders > 0 ? (totalRevenue / totalOrders).toFixed(0) : 0;

            // Mostrar estadísticas rápidas
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card highlight">
                    <div class="stat-icon">💰</div>
                    <div class="stat-value">$${totalRevenue.toLocaleString('es-AR')}</div>
                    <div class="stat-label">Ingresos Totales</div>
                    <div class="conversion-rate">Ticket Promedio: $${avgOrderValue}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value">${totalOrders}</div>
                    <div class="stat-label">Pedidos Completados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👁️</div>
                    <div class="stat-value">${metrics.totalViews}</div>
                    <div class="stat-label">Visitas Totales</div>
                    <div class="conversion-rate">${metrics.uniqueVisitors} únicos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📱</div>
                    <div class="stat-value">${metrics.whatsappClicks}</div>
                    <div class="stat-label">Clicks en WhatsApp</div>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">${conversionRate}%</div>
                    <div class="stat-label">Tasa de Conversión</div>
                </div>
            `;

            // Crear gráficos
            createSalesChart(metrics);
            createProductsChart(metrics);
            createConversionChart(metrics);
            createGrowthChart(metrics);
            createProductsTable(metrics);
        }

        function createSalesChart(metrics) {
            const ctx = document.getElementById('salesChart');
            
            // Obtener últimos 7 días
            const last7Days = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                last7Days.push(date.toISOString().split('T')[0]);
            }

            const data = last7Days.map(date => {
                const dayStats = metrics.dailyStats[date] || { revenue: 0 };
                return dayStats.revenue;
            });

            const labels = last7Days.map(date => {
                const d = new Date(date);
                return d.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric' });
            });

            if (salesChart) salesChart.destroy();
            
            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ingresos ($)',
                        data: data,
                        borderColor: '#F5C842',
                        backgroundColor: 'rgba(245, 200, 66, 0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#cccccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#cccccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        function createProductsChart(metrics) {
            const ctx = document.getElementById('productsChart');
            
            const products = Object.values(metrics.productStats || {})
                .sort((a, b) => b.timesAdded - a.timesAdded)
                .slice(0, 5);

            if (products.length === 0) {
                ctx.parentElement.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>No hay datos de productos aún</p></div>';
                return;
            }

            const labels = products.map(p => p.name);
            const data = products.map(p => p.timesAdded);

            if (productsChart) productsChart.destroy();

            productsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Veces Agregado',
                        data: data,
                        backgroundColor: [
                            'rgba(245, 200, 66, 0.8)',
                            'rgba(200, 117, 51, 0.8)',
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(59, 130, 246, 0.8)',
                            'rgba(239, 68, 68, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#cccccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#cccccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        function createConversionChart(metrics) {
            const ctx = document.getElementById('conversionChart');
            
            const totalOrders = metrics.orderHistory.length;
            const noConversion = Math.max(0, metrics.uniqueVisitors - totalOrders);

            if (conversionChart) conversionChart.destroy();

            conversionChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Conversiones', 'Sin Conversión'],
                    datasets: [{
                        data: [totalOrders, noConversion],
                        backgroundColor: ['#10b981', 'rgba(255, 255, 255, 0.1)'],
                        borderColor: ['#10b981', 'rgba(255, 255, 255, 0.2)'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff' }
                        }
                    }
                }
            });
        }

        function createGrowthChart(metrics) {
            const ctx = document.getElementById('growthChart');
            
            const dates = Object.keys(metrics.dailyStats).sort();
            const cumulativeRevenue = [];
            let total = 0;

            dates.forEach(date => {
                total += metrics.dailyStats[date].revenue || 0;
                cumulativeRevenue.push(total);
            });

            const labels = dates.map(date => {
                const d = new Date(date);
                return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
            });

            if (growthChart) growthChart.destroy();

            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.slice(-14), // Últimos 14 días
                    datasets: [{
                        label: 'Ingresos Acumulados ($)',
                        data: cumulativeRevenue.slice(-14),
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#cccccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#cccccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        function createProductsTable(metrics) {
            const tbody = document.getElementById('productsTableBody');
            const products = Object.values(metrics.productStats || {})
                .sort((a, b) => b.totalRevenue - a.totalRevenue);

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">No hay datos de productos aún</td></tr>';
                return;
            }

            const maxAdded = Math.max(...products.map(p => p.timesAdded));

            tbody.innerHTML = products.map(product => {
                const popularity = Math.round((product.timesAdded / maxAdded) * 100);
                return `
                    <tr>
                        <td><strong>${product.name}</strong></td>
                        <td>$${product.price.toLocaleString('es-AR')}</td>
                        <td>${product.timesAdded}</td>
                        <td><strong style="color: #F5C842">$${product.totalRevenue.toLocaleString('es-AR')}</strong></td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div style="width: 100px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                                    <div style="width: ${popularity}%; height: 100%; background: #F5C842;"></div>
                                </div>
                                <span>${popularity}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function refreshDashboard() {
            loadDashboard();
        }

        function exportData() {
            if (window.elpasajeAnalytics) {
                window.elpasajeAnalytics.exportData();
            } else {
                const metrics = localStorage.getItem('elpasaje_metrics');
                const dataBlob = new Blob([metrics], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `elpasaje-metrics-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            }
        }

        function goToSite() {
            window.location.href = 'index.html';
        }

        function resetMetrics() {
            const password = prompt('🔐 Acceso Restringido\n\nPara resetear las métricas, ingrese la contraseña:');
            
            if (password !== '1234') {
                if (password !== null) {
                    alert('❌ Contraseña incorrecta. Operación cancelada.');
                }
                return;
            }
            
            if (confirm('⚠️ ¿Estás seguro de que quieres resetear TODAS las métricas?\n\nEsta acción no se puede deshacer.')) {
                localStorage.removeItem('elpasaje_metrics');
                sessionStorage.clear();
                alert('✅ Métricas reseteadas exitosamente');
                loadDashboard();
            }
        }
    </script>
</body>
</html>
